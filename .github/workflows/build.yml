name: Build Lendo Bem APK
on: [push]

# Adicionamos a variável que o GitHub pediu para o futuro
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Gerar APK (Modo Automático)
        # O 'yes' responde "sim" para todas as perguntas do Bubblewrap automaticamente
        run: yes | bubblewrap build --skipSigning

      - name: Salvar APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./*.apk
