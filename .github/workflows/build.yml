name: Build Lendo Bem APK
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          yes | bubblewrap doctor

      - name: Gerar APK (Sem Assinatura)
        # O comando --skipSigning evita que ele peça a senha
        run: yes | bubblewrap build --skipSigning

      - name: Salvar APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./*.apk
