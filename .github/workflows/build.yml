name: Build Lendo Bem APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Atualizado para v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4 # Atualizado para v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Gerar APK
        run: bubblewrap build --skipSigning

      - name: Salvar APK Pronto
        uses: actions/upload-artifact@v4 # O ERRO ESTAVA AQUI: Mudamos para v4
        with:
          name: app-release
          path: ./*.apk
