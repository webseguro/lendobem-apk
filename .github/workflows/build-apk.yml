name: Build APK - Lendo Bem

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Permissão ao gradlew
        run: chmod +x ./gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: lendo-bem-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Decodificar Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: Build APK Release
        run: ./gradlew assembleRelease --no-daemon

      - name: Assinar APK Release
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload APK Release (assinado)
        uses: actions/upload-artifact@v4
        with:
          name: lendo-bem-release-signed
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 30
