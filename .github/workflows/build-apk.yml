name: Build Lendo Bem APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Init TWA
        run: bubblewrap init --manifest https://api.dicasbrasil.com.br/lendobem/manifest.json --directory ./twa-project
        env:
          BUBBLEWRAP_SKIP_PROMPTS: true
      - name: Fix Gradle memory
        working-directory: ./twa-project
        run: |
          echo "org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
      - name: Build
        working-directory: ./twa-project
        run: bubblewrap build --skipPwaValidation
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: ./twa-project
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lendobem-apk
          path: |
            ./twa-project/app-release-signed.apk
            ./twa-project/app-release-bundle.aab
          retention-days: 30
      - name: SHA-256 fingerprint
        working-directory: ./twa-project
        run: |
          keytool -list -v -keystore android.keystore \
            -alias ${{ secrets.KEY_ALIAS }} \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep "SHA256:"
